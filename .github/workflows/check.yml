name: Check

on:
  pull_request:
    paths:
      - .github/workflows/check.yml
      - crates/**
      - Cargo.*
      - "!**/*.md"
  push:
    branches:
      - main
    paths:
      - .github/workflows/check.yml
      - crates/**
      - Cargo.*
      - "!**/*.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  cargo-fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run cargo fmt
        run: |
          rustup component add rustfmt
          cargo fmt \
            --all \
            --check

  cargo-clippy:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Run cargo clippy
        run: |
          rustup component add clippy
          cargo clippy \
            --all-targets \
            --all-features \
            --locked \
            -- \
            -D warnings

  cargo-msrv:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3.4.0
        with:
          crate: cargo-msrv
          version: 0.19.3
      - name: Run cargo msrv
        run: |
          # Verify MSRV for each package
          find crates -mindepth 2 -name Cargo.toml | while read -r manifest
          do
            echo "Checking package $manifest"
            cargo msrv verify --manifest-path "$manifest" || exit 1
          done

  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Run tests
        run: >
          cargo test
          --all-targets
          --all-features
          --workspace
          --locked
